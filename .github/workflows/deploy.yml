name: Deploy (Staging)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  migrate-d1:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply vault-db migrations
        working-directory: apps/ingest
        run: pnpm exec wrangler d1 migrations apply vault-db --remote

      - name: Apply bot-db migrations
        working-directory: apps/tg-bot
        run: pnpm exec wrangler d1 migrations apply bot-db --remote

  deploy-workers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    strategy:
      fail-fast: false
      matrix:
        worker:
          - { name: vault-ingest, dir: apps/ingest }
          - { name: tg-bot, dir: apps/tg-bot }
          - { name: vault-api-read, dir: apps/api-read }
          - { name: vault-api-write, dir: apps/api-write }
          - { name: vault-anchor-cron, dir: apps/anchor-cron }
          - { name: vault-operator, dir: apps/operator }
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy ${{ matrix.worker.name }}
        working-directory: ${{ matrix.worker.dir }}
        run: pnpm exec wrangler deploy

  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: apps/web
        run: pnpm build

      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        run: pnpm exec wrangler pages deploy .svelte-kit/cloudflare --project-name=open-care-web --branch=main

  smoke-test:
    needs: [migrate-d1, deploy-workers, deploy-frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test staging
        run: bash tools/smoke/smoke-test.sh https://staging.open-care.org
