name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Secret scan (treasury key)
        run: |
          grep -r "treasury.*private\|private.*key\|TREASURY_SECRET" apps/ packages/ --include="*.ts" --include="*.json" --include="*.yml" && echo "FAIL: Treasury key reference found!" && exit 1 || echo "PASS: No treasury key references"

      - name: SvelteKit sync (generate .svelte-kit/tsconfig.json)
        working-directory: apps/web
        run: pnpm exec svelte-kit sync

      - name: Quality gates (format:check → lint → typecheck → test → build)
        run: pnpm run final-check
