packages:
  - 'apps/*'
  - 'packages/*'
  - 'tools/*'

allowBuilds:
  better-sqlite3: true
  bigint-buffer: true
  bufferutil: true
  esbuild: true
  sharp: true
  unrs-resolver: true
  utf-8-validate: true
  workerd: true

minimumReleaseAgeExclude:
  - '@cloudflare/vitest-pool-workers@0.16.16'
  - miniflare@4.20260616.0
  - wrangler@4.101.0
  - cookie@0.7.0
  - ws@8.21.0
  - undici@7.28.0
  - '@cloudflare/vitest-pool-workers@0.16.17'
  - miniflare@4.20260617.0
  - wrangler@4.102.0

onlyBuiltDependencies:
  - esbuild
  - sharp
  - workerd

overrides:
  cookie@<0.7.0: ^0.7.0
  undici@>=7.0.0 <7.28.0: ^7.28.0
  undici@>=7.23.0 <7.28.0: ^7.28.0
  ws@>=8.0.0 <8.21.0: ^8.21.0
